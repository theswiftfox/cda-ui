name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    uses: eclipse-opensovd/cicd-workflows/.github/workflows/tauri-release.yml@c90c3ffebead613b4b6fc9ab1162a52b253d3ccf
    with:
      app-name: "CDA UI"
      app-binary-name: "cda-ui"
      rust-version: "1.88.0"
      tauri-conf-path: "src-tauri/tauri.conf.json"
      cargo-toml-path: "src-tauri/Cargo.toml"
      package-manager: "npm"
      frontend-dir: "."
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
