name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0). Leave empty to use package.json version."
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # macOS (aarch64 + x86_64, signed & notarized)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Write API key file
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" > ~/private_keys/AuthKey_${APPLE_API_KEY}.p8

      - name: Build and sign (aarch64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm build:desktop -- --target aarch64-apple-darwin

      - name: Build and sign (x86_64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm build:desktop -- --target x86_64-apple-darwin

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts

          # DMG files (for direct download)
          cp target/aarch64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null || true
          cp target/x86_64-apple-darwin/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null || true

          # Updater bundles (.tar.gz) and signatures (.sig)
          for f in target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .app.tar.gz)
            cp "$f" "release-artifacts/${base}_aarch64.app.tar.gz"
            [ -f "${f}.sig" ] && cp "${f}.sig" "release-artifacts/${base}_aarch64.app.tar.gz.sig"
          done

          for f in target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz; do
            [ -f "$f" ] || continue
            base=$(basename "$f" .app.tar.gz)
            cp "$f" "release-artifacts/${base}_x86_64.app.tar.gz"
            [ -f "${f}.sig" ] && cp "${f}.sig" "release-artifacts/${base}_x86_64.app.tar.gz.sig"
          done

          ls -la release-artifacts/

          DMG_COUNT=$(ls release-artifacts/*.dmg 2>/dev/null | wc -l)
          BUNDLE_COUNT=$(ls release-artifacts/*.tar.gz 2>/dev/null | wc -l)
          SIG_COUNT=$(ls release-artifacts/*.tar.gz.sig 2>/dev/null | wc -l)

          if [ "$DMG_COUNT" -eq 0 ]; then echo "ERROR: No DMG files found"; exit 1; fi
          if [ "$BUNDLE_COUNT" -eq 0 ]; then echo "ERROR: No updater bundles found"; exit 1; fi
          if [ "$SIG_COUNT" -eq 0 ]; then echo "ERROR: No updater signatures found"; exit 1; fi

          echo "Collected $DMG_COUNT DMG(s), $BUNDLE_COUNT bundle(s), $SIG_COUNT signature(s)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: release-artifacts/*

  # ─────────────────────────────────────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/install-linux-deps

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm build:desktop

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts

          # .deb
          cp target/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true

          # AppImage
          cp target/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true

          # Updater bundle (.AppImage.tar.gz + .sig)
          cp target/release/bundle/appimage/*.AppImage.tar.gz release-artifacts/ 2>/dev/null || true
          cp target/release/bundle/appimage/*.AppImage.tar.gz.sig release-artifacts/ 2>/dev/null || true

          ls -la release-artifacts/

          APPIMAGE_COUNT=$(ls release-artifacts/*.AppImage 2>/dev/null | wc -l)
          DEB_COUNT=$(ls release-artifacts/*.deb 2>/dev/null | wc -l)

          if [ "$APPIMAGE_COUNT" -eq 0 ] && [ "$DEB_COUNT" -eq 0 ]; then
            echo "ERROR: No Linux artifacts found"
            exit 1
          fi

          echo "Collected $APPIMAGE_COUNT AppImage(s), $DEB_COUNT deb(s)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: release-artifacts/*

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows x86_64 (no Authenticode signing)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm build:desktop

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts

          # NSIS installer
          Copy-Item target/release/bundle/nsis/*.exe release-artifacts/ -ErrorAction SilentlyContinue

          # MSI installer
          Copy-Item target/release/bundle/msi/*.msi release-artifacts/ -ErrorAction SilentlyContinue

          # Updater bundle (nsis .zip + .sig)
          Copy-Item target/release/bundle/nsis/*.nsis.zip release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item target/release/bundle/nsis/*.nsis.zip.sig release-artifacts/ -ErrorAction SilentlyContinue

          Get-ChildItem release-artifacts/

          $exeCount = (Get-ChildItem release-artifacts/*.exe -ErrorAction SilentlyContinue).Count
          $msiCount = (Get-ChildItem release-artifacts/*.msi -ErrorAction SilentlyContinue).Count

          if ($exeCount -eq 0 -and $msiCount -eq 0) {
            Write-Error "ERROR: No Windows installers found"
            exit 1
          }

          Write-Output "Collected $exeCount exe(s), $msiCount msi(s)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release-artifacts/*

  # ─────────────────────────────────────────────────────────────────────────────
  # Create Release (collects all platform artifacts)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "version=$(echo '${{ inputs.version }}' | sed 's/^v//')" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r .version package.json)
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Generate latest.json for updater
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          REPO="${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # macOS signatures
          AARCH64_FILE=$(ls release-artifacts/*_aarch64.app.tar.gz 2>/dev/null | head -1)
          X86_64_MAC_FILE=$(ls release-artifacts/*_x86_64.app.tar.gz 2>/dev/null | head -1)

          AARCH64_SIG=""
          X86_64_MAC_SIG=""
          if [ -n "$AARCH64_FILE" ] && [ -f "${AARCH64_FILE}.sig" ]; then
            AARCH64_SIG=$(cat "${AARCH64_FILE}.sig")
          fi
          if [ -n "$X86_64_MAC_FILE" ] && [ -f "${X86_64_MAC_FILE}.sig" ]; then
            X86_64_MAC_SIG=$(cat "${X86_64_MAC_FILE}.sig")
          fi

          AARCH64_BASENAME=$(basename "$AARCH64_FILE")
          X86_64_MAC_BASENAME=$(basename "$X86_64_MAC_FILE")

          # Linux signature
          LINUX_FILE=$(ls release-artifacts/*.AppImage.tar.gz 2>/dev/null | head -1)
          LINUX_SIG=""
          if [ -n "$LINUX_FILE" ] && [ -f "${LINUX_FILE}.sig" ]; then
            LINUX_SIG=$(cat "${LINUX_FILE}.sig")
          fi
          LINUX_BASENAME=$(basename "$LINUX_FILE")

          # Windows signature
          WINDOWS_FILE=$(ls release-artifacts/*.nsis.zip 2>/dev/null | head -1)
          WINDOWS_SIG=""
          if [ -n "$WINDOWS_FILE" ] && [ -f "${WINDOWS_FILE}.sig" ]; then
            WINDOWS_SIG=$(cat "${WINDOWS_FILE}.sig")
          fi
          WINDOWS_BASENAME=$(basename "$WINDOWS_FILE")

          cat > release-artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes at https://github.com/${REPO}/releases/tag/${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${AARCH64_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${AARCH64_BASENAME}"
              },
              "darwin-x86_64": {
                "signature": "${X86_64_MAC_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${X86_64_MAC_BASENAME}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${LINUX_BASENAME}"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "https://github.com/${REPO}/releases/download/${TAG}/${WINDOWS_BASENAME}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat release-artifacts/latest.json

      - name: List all release artifacts
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        if: inputs.version != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: release-artifacts/*
          generate_release_notes: true
          draft: true
